name: Switchplate
options:
  bundleIdPrefix: com.shimondeitel.switchplate
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Switchplate:
    type: application
    platform: iOS
    sources:
      - path: Switchplate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.switchplate
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Switchplate/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SwitchplateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SwitchplateTests
      - path: Switchplate.storekit
    dependencies:
      - target: Switchplate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.switchplate.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SwitchplateUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SwitchplateUITests
    dependencies:
      - target: Switchplate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.switchplate.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Switchplate:
    build:
      targets:
        Switchplate: all
        SwitchplateTests: [test]
        SwitchplateUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Switchplate.storekit
    test:
      config: Debug
      storeKitConfiguration: Switchplate.storekit
      targets:
        - SwitchplateTests
        - SwitchplateUITests
    archive:
      config: Release
